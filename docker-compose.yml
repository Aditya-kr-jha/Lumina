version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lumina-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/app/.env
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lumina-frontend
    ports:
      - "80:80"
    depends_on:
    - backend
    restart: always