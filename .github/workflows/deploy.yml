name: Deploy Lumina to GCP

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to GCP
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e

            cd /home/${{ secrets.GCP_USERNAME }}/lumina-repo
            git fetch origin main
            git reset --hard origin/main

            docker build -t lumina-backend:latest ./backend
            docker build -t lumina-frontend:latest ./frontend

            cd /home/${{ secrets.GCP_USERNAME }}/portfolio
            docker-compose up -d --no-deps lumina-backend lumina-frontend

            docker exec lumina-backend alembic upgrade head || true
            docker image prune -f

            sleep 3
            curl -sf http://localhost:8001/health && echo "Lumina OK" || echo "Lumina FAILED"